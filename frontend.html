<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-app-capable" content="yes"/>
<meta name="apple-mobile-app-status-bar-style" content="default"/>
<meta name="apple-mobile-app-title" content="Parqueadero USC"/>
<meta name="theme-color" content="#3BB8F5"/>
<meta http-equiv="Permissions-Policy" content="camera=*"/>
<title>Parqueadero USC</title>
<!-- Asegúrate de que manifest.json esté en la raíz de tu proyecto en Railway -->
<link rel="manifest" href="/manifest.json"/>
<!-- Asegúrate de que icon-192.png esté en la raíz de tu proyecto en Railway -->
<link rel="apple-touch-icon" href="/icon-192.png"/>
<!-- Asegúrate de que favicon.ico esté en la raíz de tu proyecto en Railway -->
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
/* --- ESTILOS GENERALES (MANTENER) --- */
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: -webkit-fill-available; }
body {
  font-family: 'Nunito', sans-serif;
  background: #3BB8F5;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overscroll-behavior: none;
  -webkit-overflow-scrolling: touch;
}
.phone-wrap {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  background: #3BB8F5;
  position: relative;
  overflow: hidden;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

/* --- SCREENS --- */
.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 60px 32px 40px;
  animation: fadeIn 0.3s ease;
}
.screen.active { display: flex; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* --- TYPOGRAPHY --- */
.big-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 52px;
  line-height: 1.05;
  color: #0a0a0a;
  text-align: center;
  margin-bottom: 8px;
  letter-spacing: -1px;
}
.sub-title {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  color: #0a0a0a;
  text-align: center;
  text-transform: uppercase;
  margin-bottom: 48px;
}
.section-title {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 34px;
  color: #0a0a0a;
  text-align: left;
  width: 100%;
  margin-bottom: 32px;
  line-height: 1.1;
}
.section-title.center { text-align: center; }
.field-label {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 24px;
  color: #0a0a0a;
  width: 100%;
  margin-bottom: 8px;
  margin-top: 4px;
}

/* --- BUBBLE INPUTS --- */
.bubble-input {
  width: 100%;
  background: #f0f0f0;
  border: 2.5px solid #ccc;
  border-radius: 50px;
  padding: 16px 24px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px; 
  font-weight: 700;
  color: #0a0a0a;
  outline: none;
  margin-bottom: 14px;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
  touch-action: manipulation;
}
.bubble-input:focus {
  border-color: #1a6fbf;
  background: #fff;
}
.bubble-input::placeholder { color: #aaa; font-weight: 600; }
.bubble-select {
  width: 100%;
  background: #f0f0f0;
  border: 2.5px solid #ccc;
  border-radius: 50px;
  padding: 16px 24px;
  font-family: 'Nunito', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: #0a0a0a;
  outline: none;
  margin-bottom: 14px;
  cursor: pointer;
  -webkit-appearance: none;
  appearance: none;
  touch-action: manipulation;
}

/* --- BUTTONS --- */
.btn-link {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 26px;
  color: #4a3cbf;
  text-decoration: underline;
  text-underline-offset: 5px;
  background: none;
  border: none;
  cursor: pointer;
  margin: 12px 0;
  text-align: center;
  letter-spacing: 0.5px;
  transition: opacity 0.2s;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px; 
}
.btn-link:hover { opacity: 0.75; }
.btn-link.dark { color: #0a0a0a; }
.btn-link.small { font-size: 18px; }
.btn-bubble {
  background: #f5f5f5;
  border: 2.5px solid #ccc;
  border-radius: 50px;
  padding: 15px 40px;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  color: #0a0a0a;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 4px;
  margin: 8px 0;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.5px;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  min-height: 44px;
}
.btn-bubble:hover { background: #e0e0e0; transform: scale(1.02); }
.btn-bubble.full { width: 100%; }

/* --- VEHICLE OPTION BUTTONS --- */
.vehicle-option {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #f4a0a0;
  border: 2.5px solid #c05050;
  border-radius: 8px;
  padding: 14px 18px;
  width: 75%;
  margin-bottom: 12px;
  cursor: pointer;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 22px;
  color: #0a0a0a;
  text-decoration: underline;
  text-underline-offset: 4px;
  transition: background 0.15s, transform 0.1s;
}
.vehicle-option:hover { background: #e08080; transform: scale(1.02); }
.vehicle-dot {
  width: 14px; height: 14px;
  background: #8b2020;
  border-radius: 50%;
  flex-shrink: 0;
}

/* --- WARNING TEXT --- */
.warning-text {
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  color: #c0392b;
  text-align: center;
  margin: 20px 0;
  line-height: 1.4;
}

/* --- INFO BOX --- */
.info-box {
  background: #1a0a8f;
  border-radius: 12px;
  padding: 28px 24px;
  width: 92%;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 700;
  text-align: center;
  line-height: 1.5;
  margin: 20px 0;
}

/* --- HISTORIAL BOX --- */
.historial-box {
  background: #1a0a8f;
  border-radius: 12px;
  padding: 20px;
  width: 92%;
  min-height: 320px;
  color: #fff;
  margin-bottom: 20px;
}
.historial-box h3 {
  font-family: 'Black Han Han Sans', sans-serif;
  font-size: 24px;
  margin-bottom: 16px;
}
.historial-item {
  background: rgba(255,255,255,0.12);
  border-radius: 8px;
  padding: 12px 16px;
  margin-bottom: 10px;
  font-size: 13px;
  font-weight: 600;
  line-height: 1.6;
  border-left: 3px solid #7bc8ff;
}
.historial-item .estado {
  display: inline-block;
  background: #22c55e;
  color: #fff;
  border-radius: 20px;
  padding: 2px 10px;
  font-size: 11px;
  margin-left: 6px;
  font-weight: 800;
}
.historial-item .estado.salida {
  background: #ef4444;
}
.historial-empty {
  text-align: center;
  opacity: 0.5;
  margin-top: 60px;
  font-size: 15px;
}

/* --- MAP BLOCK (MANTENER) --- */
.map-block {
  width: 92%;
  border-radius: 12px;
  overflow: hidden;
  margin: 16px 0;
  border: 3px solid #0a0a0a;
}
.map-block img { width: 100%; display: block; }
.map-placeholder {
  width: 92%;
  height: 260px;
  background: #1a1a1a;
  border-radius: 12px;
  margin: 16px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #555;
  font-size: 14px;
  font-weight: 600;
  border: 3px solid #0a0a0a;
  flex-direction: column;
  gap: 8px;
}

/* --- QR BOX --- */
.qr-block {
  width: 92%;
  height: 280px;
  background: #0a0a0a;
  border-radius: 8px;
  margin: 12px 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #444;
  font-size: 13px;
  font-weight: 600;
  flex-direction: column;
  gap: 10px;
}
.qr-icon { font-size: 48px; opacity: 0.3; }

/* --- OTP --- */
.otp-wrap {
  display: flex; gap: 14px; margin: 20px 0;
}
.otp-box {
  width: 68px; height: 80px;
  background: #0a0a0a;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 32px;
  color: #fff;
}
.otp-input-real {
  width: 68px; height: 80px;
  background: #f0f0f0;
  border: 2.5px solid #ccc;
  border-radius: 8px;
  font-size: 32px;
